## docker-compose.prod.yml — stack di PRODUZIONE.
##
##   - DB non esposto sull'host (solo rete docker interna)
##   - backend non esposto sull'host (solo rete docker interna)
##   - frontend buildato sul PC (npm run build) e committato in repo come
##     frontend/dist/. Caddy lo serve via bind-mount diretto: niente build
##     sulla VM (la VM piccola da 8GB / poca RAM andava in OOM su `npm ci`).
##   - backup nightly fatto da un sidecar (no cron host, no SSH richiesto).
##   - Caddy davanti: HTTPS automatico via Let's Encrypt e SPA statica
##   - cleaner giornaliero per liberare spazio su VM piccola (8 GB)
##   - logging json-file con rotation a 10MB x 3 file
##
## Tutto vive in volumi nominati Docker. Niente bind-mount su /opt/pcm-hub.
## Le variabili d'ambiente NON vengono lette da .env: vanno impostate
## come "Stack environment variables" in Portainer (vedi DEPLOY_NOTES.txt).

services:
  db:
    image: postgres:16-alpine
    container_name: pcm_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
    container_name: pcm_backend
    environment:
      ENV: ${ENV}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TZ: UTC
    expose:
      - "8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips=*
    depends_on:
      - db
    restart: unless-stopped
    # Health check: pinga /healthz ogni 30s. start_period: tempo di
    # boot di uvicorn + lifespan (bootstrap admin, ecc.) prima che
    # docker inizi a contare i fallimenti.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: pcm_caddy
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv/dist:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Sidecar di backup. Una volta al giorno fa pg_dump del DB di prod
  # nel volume nominato `pcm_backups`. Tiene gli ultimi KEEP=3 dump
  # (3 giorni di rolling window). Recupero: console Portainer del
  # container pcm_backup -> `cat /backups/<file>.dump | base64`.
  backup:
    image: postgres:16-alpine
    container_name: pcm_backup
    depends_on:
      - db
    environment:
      PGHOST: ${POSTGRES_HOST}
      PGPORT: ${POSTGRES_PORT}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      KEEP: "3"
      TZ: UTC
    volumes:
      - pcm_backups:/backups
    command:
      - sh
      - -c
      - |
        set -eu
        echo "[backup] avviato. KEEP=$$KEEP, dest=/backups"
        # Aspetta che il DB sia su prima del primo dump.
        until pg_isready -q; do
          echo "[backup] DB non pronto, attendo 5s..."
          sleep 5
        done
        while true; do
          ts=$$(date -u +%Y%m%d-%H%M%S)
          out="/backups/pcm-$$ts.dump"
          tmp="$$out.partial"
          echo "[backup] $$(date -Iseconds) inizio dump -> $$out"
          if pg_dump -F c -f "$$tmp"; then
            mv "$$tmp" "$$out"
            echo "[backup] $$(date -Iseconds) dump ok ($$(stat -c%s "$$out") bytes)"
          else
            rm -f "$$tmp"
            echo "[backup] $$(date -Iseconds) DUMP FALLITO"
          fi
          # Ritenzione: tieni gli ultimi KEEP file *.dump, cancella il resto.
          ls -1t /backups/*.dump 2>/dev/null | tail -n +$$((KEEP+1)) | xargs -r rm -f
          echo "[backup] $$(date -Iseconds) prossimo dump tra 24h"
          sleep 86400
        done
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cleaner:
    image: docker:25-cli
    container_name: pcm_cleaner
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Pulizia giornaliera. NON tocca i volumes (postgres_data, caddy_data,
    # caddy_config, frontend_dist, pcm_backups restano intatti). Libera
    # immagini orfane lasciate dai rebuild e cache di build (importante
    # con 8 GB di disco).
    command:
      - sh
      - -c
      - |
        while true; do
          echo "[cleaner] $(date -Iseconds) starting cleanup"
          docker container prune -f
          docker image prune -af
          docker builder prune -af
          docker network prune -f
          echo "[cleaner] $(date -Iseconds) cleanup done"
          sleep 86400
        done
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  pcm_backups:
