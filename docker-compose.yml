services:
  db:
    image: postgres:16-alpine
    container_name: pcm_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Lock il timezone del DB a UTC: i timestamp naive scritti dall'app
      # vengono interpretati e restituiti coerentemente.
      TZ: UTC
      PGTZ: UTC
    ports:
      # Solo localhost (il DB non deve essere esposto sulla rete LAN).
      # Host 5433 -> container 5432: evita conflitto con PostgreSQL nativo di Windows.
      # Per pgAdmin: host=127.0.0.1, port=5433.
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: pcm_backend
    volumes:
      - ./backend:/app
    # Tutte le variabili (SECRET_KEY, DATABASE_URL, CORS_ORIGINS, ...)
    # arrivano dal file .env al root del progetto.
    env_file:
      - .env
    environment:
      # Timezone del container in UTC (utc_now() resta UTC anche se il TZ
      # del sistema host fosse diverso).
      TZ: UTC
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --reload
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: pcm_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true

volumes:
  postgres_data:
