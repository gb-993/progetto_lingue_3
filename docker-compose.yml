services:
  db:
    image: postgres:16-alpine
    container_name: pcm_db
    environment:
      POSTGRES_USER: pcm_user
      POSTGRES_PASSWORD: pcm_password
      POSTGRES_DB: pcm_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: pcm_backend
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://pcm_user:pcm_password@db/pcm_hub
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --reload
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: pcm_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true

volumes:
  postgres_data: