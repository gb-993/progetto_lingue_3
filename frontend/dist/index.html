    <title>PCM Hub</title>
    <script>
      // Applica il tema il prima possibile per evitare il flash di tema chiaro
      // su utenti che hanno scelto dark (o che hanno il sistema in dark).
      (function () {
        try {
          var stored = localStorage.getItem('pcm-theme');
          var theme = (stored === 'light' || stored === 'dark')
            ? stored
            : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
