<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Service unavailable | PCM Hub</title>
  <link rel="icon" href="/favicon.svg">
  <meta name="robots" content="noindex">
  <style>
    /* Tokens (light + dark via prefers-color-scheme) - tenuti inline cosi'
       la pagina renderizza anche se l'app/CSS bundle non sono raggiungibili. */
    :root {
      --brand:#d14124; --brand-700:#a8341a;
      --text:#15181c; --text-muted:#565b61;
      --bg:#f1f3f5; --surface:#fff;
      --border:#d0d4d9;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text:#eceef2; --text-muted:#a3aab5;
        --bg:#14171c; --surface:#1d2027;
        --border:#3a3f4b;
        --brand:#e9573b; --brand-700:#c0411f;
        color-scheme: dark;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin:0; min-height:100dvh;
      font-family: system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
      color:var(--text); background:var(--bg);
      display:flex; flex-direction:column; align-items:center;
      padding:3rem 1.5rem;
    }
    header.page {
      max-width:920px; width:100%; margin-bottom:2rem;
      font-size:.95rem; color:var(--text-muted); letter-spacing:.01em;
      text-align:center;
    }
    header.page strong { color:var(--text); font-weight:700; }
    .hero {
      max-width:560px; width:100%; text-align:center; margin:auto 0;
    }
    .icon {
      width:96px; height:96px; margin:0 auto 1.5rem;
      display:flex; align-items:center; justify-content:center;
      background: color-mix(in oklab, var(--brand) 15%, transparent);
      border-radius:50%;
      color:var(--brand);
    }
    .icon svg { width:48px; height:48px; }
    h1 {
      margin:0 0 .75rem; font-size:2.25rem; font-weight:700; line-height:1.15;
    }
    .desc {
      margin:0 auto 2.25rem; max-width:440px;
      color:var(--text-muted); font-size:1.1rem; line-height:1.55;
    }
    .cta {
      display:inline-block; padding:.9rem 2rem;
      background:var(--brand); color:#fff;
      border:1px solid color-mix(in oklab, var(--brand) 75%, black);
      border-radius:10px; font:inherit; font-size:1.05rem; font-weight:600;
      text-decoration:none; cursor:pointer;
      transition: background-color .15s ease;
    }
    .cta:hover { background:var(--brand-700); }
    .cta:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }
    .ghost {
      display:inline-block; margin-top:1.25rem;
      background:transparent; border:none;
      color:var(--text-muted); font:inherit; font-size:.9rem;
      text-decoration:none; cursor:pointer;
    }
    .ghost:hover { color:var(--brand); text-decoration:underline; }
    @media (max-width: 540px) {
      h1 { font-size:1.85rem; }
      .desc { font-size:1rem; }
    }
  </style>
</head>
<body>
  <header class="page"><strong>PCM Hub</strong></header>

  <section class="hero">
    <div class="icon" aria-hidden="true">
      <!-- wrench icon (lucide) -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>
    <h1>The service is temporarily unavailable.</h1>
    <p class="desc">Please try again in a few minutes.</p>
    <a class="cta" href="javascript:location.reload()">Try again</a>
    <a class="ghost" href="/">or go to the home page</a>
  </section>
</body>
</html>
